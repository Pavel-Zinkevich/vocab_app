name: vocab_app
description: A simple vocabulary app with 3 tabs.
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  cupertino_icons: ^1.0.2
  http: ^1.6.0
  html_unescape: ^2.0.0
  html: ^0.15.0
  just_audio: ^0.9.40
  shared_preferences: ^2.2.2

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  
  url_launcher: ^6.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  image_picker: ^1.2.1
  path_provider: ^2.1.5
  path: ^1.9.1

  crop_image: ^1.0.17

  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/

flutter_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon/app_icon.png"
  # remove_alpha_ios: true
