publish_to: 'none'
version: 0.0.1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  cupertino_icons: ^1.0.2
  http: ^1.6.0
  html_unescape: ^2.0.0
  html: ^0.15.0
  just_audio: ^0.9.40
  shared_preferences: ^2.2.2

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true